name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run type check
      run: npm run type-check
    
    - name: Run tests
      run: npm test
    
    - name: Build
      run: npm run build
    
    - name: Verify build output
      run: |
        echo "Checking build output structure..."
        ls -la dist/
        echo "Checking command files..."
        ls -la dist/command/
        echo "Checking config files..."
        ls -la dist/config/
        echo "Checking scripts..."
        ls -la dist/scripts/
        
        # Verify main entry point exists
        test -f dist/beacon.js || (echo "Error: dist/beacon.js not found" && exit 1)
        echo "Build verification passed!"

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check package.json formatting
      run: |
        # Check if package.json is valid JSON
        node -e "const pkg = require('./package.json'); console.log('Package name:', pkg.name); console.log('Version:', pkg.version);"
    
    - name: Check for required files
      run: |
        echo "Checking for required files..."
        required_files=(
          "package.json"
          "README.md"
          "LICENSE"
          "CHANGELOG.md"
          "beacon.ts"
          "tsconfig.json"
          "config/beacon.default.json"
          "scripts/setup.cjs"
        )
        
        for file in "${required_files[@]}"; do
          if [ ! -f "$file" ] && [ ! -d "$file" ]; then
            echo "Missing required file/directory: $file"
            exit 1
          fi
        done
        echo "All required files present!"