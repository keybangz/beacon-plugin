name: Development Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Automated dependency checks
  dependencies:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Check for outdated dependencies
      run: |
        echo "Checking for outdated dependencies..."
        bun outdated || true

  # Job 2: Build and type check
  build:
    needs: dependencies
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Run type check
      run: bun run type-check

    - name: Build project
      run: bun run build

    - name: Verify dist structure
      run: |
        echo "Checking distribution directory structure..."
        ls -la dist/
        test -f dist/beacon.js || (echo "Error: dist/beacon.js not found" && exit 1)
        echo "✅ All critical files present!"

  # Job 3: Run tests
  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Run tests
      run: bun test

  # Job 4: Security scan (only on main branch)
  security:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

  # Job 5: Dependency update check (only for PRs)
  check-dependencies:
    needs: dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Show outdated dependencies
      run: |
        echo "Checking for dependency updates..."
        bun outdated || true
